<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投手疲勞分析 — CPBL Analytics</title>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#3b82f6' },
            surface: { DEFAULT: '#1e2530', card: '#252e3e', border: '#2d3748' },
          }
        }
      }
    }
  </script>
  <style>body { background-color: #141920; }</style>
</head>
<body class="text-gray-100 min-h-screen font-sans">

  <!-- Nav -->
  <nav class="bg-surface border-b border-surface-border sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <span class="text-2xl">⚾</span>
        <span class="font-bold text-lg text-white">CPBL Analytics</span>
      </a>
      <div class="hidden sm:flex items-center gap-6">
        <a href="lob.html" class="text-sm text-gray-400 hover:text-white transition-colors">LOB%</a>
        <a href="fatigue.html" class="text-sm text-yellow-400 font-semibold">投手疲勞</a>
        <a href="clutch.html" class="text-sm text-gray-400 hover:text-white transition-colors">關鍵時刻</a>
        <a href="counts.html" class="text-sm text-gray-400 hover:text-white transition-colors">球數分析</a>
      </div>
      <button class="sm:hidden text-gray-400 hover:text-white" onclick="document.getElementById('mobileMenu').classList.toggle('hidden')">&#9776;</button>
    </div>
    <div id="mobileMenu" class="hidden sm:hidden bg-surface border-t border-surface-border px-4 py-2 space-y-2 text-sm text-gray-400">
      <a href="lob.html" class="block py-1 hover:text-white">LOB%</a>
      <a href="fatigue.html" class="block py-1 text-yellow-400 font-semibold">投手疲勞</a>
      <a href="clutch.html" class="block py-1 hover:text-white">關鍵時刻</a>
      <a href="counts.html" class="block py-1 hover:text-white">球數分析</a>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="max-w-6xl mx-auto px-4 pt-10 pb-6">
    <h1 class="text-3xl font-extrabold text-white">投手疲勞分析</h1>
    <p class="text-gray-400 mt-1 text-sm">追蹤投手在不同投球數區間的效率變化，找出疲勞閾值</p>
  </header>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 pb-20">

    <!-- Pitcher Selector -->
    <div class="mb-6 bg-surface-card border border-surface-border rounded-xl p-5">
      <div class="flex flex-col sm:flex-row gap-4 items-start sm:items-end">
        <div class="flex-1">
          <label class="block text-xs text-gray-400 mb-1.5">選擇投手</label>
          <select id="pitcherSelect"
            class="w-full bg-surface border border-surface-border text-white text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-brand">
            <option value="">-- 請選擇 --</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">賽季</label>
          <select id="yearSelect"
            class="bg-surface border border-surface-border text-white text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-brand">
            <option value="2026">2026</option>
            <option value="2025" selected>2025</option>
          </select>
        </div>
        <button id="analyzeBtn"
          class="bg-brand hover:bg-blue-700 text-white text-sm font-semibold px-5 py-2 rounded-lg transition-colors disabled:opacity-40"
          disabled>
          分析
        </button>
      </div>
      <!-- Fatigue warning zone info -->
      <div id="fatigueInfo" class="hidden mt-4 bg-red-900/20 border border-red-700/30 rounded-lg px-4 py-3 flex items-center gap-3 text-sm">
        <span class="text-2xl">&#9888;</span>
        <span id="fatigueText" class="text-red-300"></span>
      </div>
    </div>

    <!-- Loading / Error -->
    <div id="loadingState" class="hidden flex items-center justify-center py-16 text-gray-500">
      <svg class="animate-spin h-6 w-6 mr-3 text-brand" viewBox="0 0 24 24" fill="none">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
      </svg>
      載入中…
    </div>
    <div id="errorState" class="hidden bg-red-900/20 border border-red-700/40 rounded-xl p-6 text-center text-red-400 text-sm">
      <p class="font-semibold mb-1">無法載入資料</p>
      <p id="errorMsg" class="text-red-500/70"></p>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="flex flex-col items-center justify-center py-20 text-gray-600">
      <span class="text-5xl mb-4">&#128202;</span>
      <p>請選擇投手後點擊「分析」</p>
    </div>

    <!-- Chart -->
    <div id="chartContainer" class="hidden bg-surface-card border border-surface-border rounded-xl p-4">
      <div class="flex items-center gap-4 mb-3 px-2 text-xs text-gray-400">
        <div class="flex items-center gap-1.5">
          <span class="w-3 h-2 rounded-sm bg-blue-400 inline-block"></span> 被打擊率（左軸）
        </div>
        <div class="flex items-center gap-1.5">
          <span class="w-3 h-2 rounded-sm bg-green-400 inline-block"></span> 三振率（右軸）
        </div>
        <div class="flex items-center gap-1.5">
          <span class="w-3 h-2 rounded-sm bg-red-500/60 inline-block"></span> 疲勞警戒區
        </div>
      </div>
      <div id="fatigueChart" style="height:420px;"></div>
    </div>

    <!-- Stats Table -->
    <div id="tableContainer" class="hidden mt-6 bg-surface-card border border-surface-border rounded-xl overflow-hidden">
      <div class="px-5 py-4 border-b border-surface-border">
        <h2 class="font-semibold text-white text-sm">各投球數區間詳細數據</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-surface-border text-gray-500 text-xs uppercase tracking-wide">
              <th class="px-5 py-3 text-left">投球數區間</th>
              <th class="px-5 py-3 text-right">打席數</th>
              <th class="px-5 py-3 text-right">被打擊率</th>
              <th class="px-5 py-3 text-right">三振率</th>
              <th class="px-5 py-3 text-right">保送率</th>
              <th class="px-5 py-3 text-right">狀態</th>
            </tr>
          </thead>
          <tbody id="fatigueTableBody"></tbody>
        </table>
      </div>
    </div>

  </main>

  <footer class="border-t border-surface-border text-center py-6 text-xs text-gray-600">
    資料來源：Rebas Open Data + CPBL 官網公開資料 | ODC-By License
  </footer>

  <script>
    let currentData = null;
    let fatigueChart = null;

    // Load pitcher list from static fatigue leaderboard JSON
    async function loadPitchers() {
      const year = document.getElementById('yearSelect').value;
      try {
        const res = await fetch(`api/analysis/fatigue_${year}.json`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const ct = res.headers.get('content-type') || '';
        if (!ct.includes('json')) throw new Error('此賽季尚無資料');
        const json = await res.json();
        const pitchers = json.data || json || [];
        const sel = document.getElementById('pitcherSelect');
        // Clear existing options except the placeholder
        while (sel.options.length > 1) sel.remove(1);
        pitchers.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.pitcher_id;
          // Extract display name: remove "cpbl_" prefix
          const displayName = p.pitcher_id ? p.pitcher_id.replace(/^cpbl_/, '') : '—';
          const teamLabel = p.team ? ` (${p.team})` : '';
          opt.textContent = displayName + teamLabel;
          sel.appendChild(opt);
        });
        if (pitchers.length === 0) {
          const opt = document.createElement('option');
          opt.value = '';
          opt.textContent = '無資料（此賽季）';
          opt.disabled = true;
          sel.appendChild(opt);
        }
      } catch (e) {
        // Fallback demo options
        const sel = document.getElementById('pitcherSelect');
        while (sel.options.length > 1) sel.remove(1);
        const demos = [
          { value: 'cpbl_王建民', label: '王建民 (中信兄弟)' },
          { value: 'cpbl_陳冠宇', label: '陳冠宇 (統一獅)' },
          { value: 'cpbl_林子偉', label: '林子偉 (味全龍)' },
        ];
        demos.forEach(d => {
          const opt = document.createElement('option');
          opt.value = d.value;
          opt.textContent = d.label;
          sel.appendChild(opt);
        });
      }
    }

    document.getElementById('pitcherSelect').addEventListener('change', function() {
      document.getElementById('analyzeBtn').disabled = !this.value;
    });

    document.getElementById('analyzeBtn').addEventListener('click', () => {
      const pid = document.getElementById('pitcherSelect').value;
      const year = document.getElementById('yearSelect').value;
      if (pid) loadFatigueData(pid, year);
    });

    async function loadFatigueData(pitcherId, year) {
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('errorState').classList.add('hidden');
      document.getElementById('chartContainer').classList.add('hidden');
      document.getElementById('tableContainer').classList.add('hidden');
      document.getElementById('fatigueInfo').classList.add('hidden');
      document.getElementById('loadingState').classList.remove('hidden');

      try {
        const res = await fetch(`api/analysis/fatigue/${year}/${encodeURIComponent(pitcherId)}.json`);
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        const ct = res.headers.get('content-type') || '';
        if (!ct.includes('json')) throw new Error('此賽季尚無資料');
        const json = await res.json();
        currentData = json.buckets || json.data || (Array.isArray(json) ? json : []);
        document.getElementById('loadingState').classList.add('hidden');
      } catch (e) {
        currentData = buildDemoFatigueData();
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('errorState').classList.remove('hidden');
        document.getElementById('errorMsg').textContent = e.message + ' — 顯示 Demo 資料';
      }

      document.getElementById('chartContainer').classList.remove('hidden');
      document.getElementById('tableContainer').classList.remove('hidden');
      renderFatigueChart(currentData);
      renderFatigueTable(currentData);
    }

    function buildDemoFatigueData() {
      const buckets = ['1-20', '21-40', '41-60', '61-80', '81-100', '101+'];
      const bas = [0.230, 0.240, 0.245, 0.260, 0.285, 0.320];
      const krs = [0.220, 0.215, 0.205, 0.185, 0.160, 0.130];
      const bbrs = [0.065, 0.070, 0.075, 0.085, 0.100, 0.120];
      const pas = [95, 88, 82, 76, 60, 30];
      return buckets.map((b, i) => ({
        pitch_bucket: b,
        pa: pas[i],
        ba_against: bas[i],
        k_pct: krs[i],
        bb_pct: bbrs[i],
      }));
    }

    function renderFatigueChart(data) {
      const buckets = data.map(d => d.pitch_start && d.pitch_end ? `${d.pitch_start}-${d.pitch_end}` : (d.pitch_bucket || d.bucket || '—'));
      const bas = data.map(d => d.ba_against || 0);
      const kpcts = data.map(d => d.k_pct || 0);

      const fatigueIdx = data.findIndex(d => d.is_fatigue_point);
      const markAreaData = fatigueIdx >= 0
        ? [[{ xAxis: buckets[fatigueIdx] }, { xAxis: buckets[buckets.length - 1] }]]
        : [];

      if (fatigueIdx >= 0) {
        document.getElementById('fatigueInfo').classList.remove('hidden');
        document.getElementById('fatigueText').textContent =
          `疲勞警戒區從「${buckets[fatigueIdx]}」球開始，被打擊率較初期上升超過 20%`;
      }

      if (fatigueChart) fatigueChart.dispose();
      fatigueChart = echarts.init(document.getElementById('fatigueChart'));

      fatigueChart.setOption({
        backgroundColor: 'transparent',
        grid: { top: 36, right: 70, bottom: 60, left: 60, containLabel: true },
        tooltip: {
          trigger: 'axis',
          backgroundColor: '#252e3e',
          borderColor: '#2d3748',
          textStyle: { color: '#f3f4f6', fontSize: 13 },
          formatter: params => {
            let s = `<b>${params[0].name} 球</b><br/>`;
            params.forEach(p => {
              if (p.seriesName === '被打擊率') s += `${p.marker} 被打擊率: ${p.value.toFixed(3)}<br/>`;
              else if (p.seriesName === '三振率') s += `${p.marker} 三振率: ${(p.value * 100).toFixed(1)}%<br/>`;
            });
            return s;
          },
        },
        legend: {
          data: ['被打擊率', '三振率'],
          top: 0,
          textStyle: { color: '#9ca3af', fontSize: 11 },
        },
        xAxis: {
          type: 'category',
          data: buckets,
          name: '投球數區間',
          nameLocation: 'middle',
          nameGap: 35,
          nameTextStyle: { color: '#9ca3af', fontSize: 12 },
          axisLabel: { color: '#9ca3af' },
          axisLine: { lineStyle: { color: '#2d3748' } },
          axisTick: { lineStyle: { color: '#2d3748' } },
        },
        yAxis: [
          {
            type: 'value',
            name: '被打擊率',
            nameTextStyle: { color: '#60a5fa', fontSize: 11 },
            axisLabel: { formatter: v => v.toFixed(3), color: '#60a5fa' },
            splitLine: { lineStyle: { color: '#2d3748' } },
            axisLine: { show: false },
          },
          {
            type: 'value',
            name: '三振率',
            nameTextStyle: { color: '#4ade80', fontSize: 11 },
            axisLabel: { formatter: v => (v * 100).toFixed(0) + '%', color: '#4ade80' },
            splitLine: { show: false },
            axisLine: { show: false },
          },
        ],
        series: [
          {
            name: '被打擊率',
            type: 'line',
            yAxisIndex: 0,
            data: bas,
            lineStyle: { color: '#60a5fa', width: 2.5 },
            itemStyle: { color: '#60a5fa', borderWidth: 2, borderColor: '#141920' },
            symbol: 'circle',
            symbolSize: 8,
            smooth: true,
            areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: 'rgba(96,165,250,0.15)' },
              { offset: 1, color: 'rgba(96,165,250,0)' },
            ]) },
            markArea: {
              silent: true,
              itemStyle: { color: 'rgba(239,68,68,0.08)', borderColor: 'rgba(239,68,68,0.3)', borderWidth: 1 },
              data: markAreaData,
            },
            animationDuration: 800,
          },
          {
            name: '三振率',
            type: 'line',
            yAxisIndex: 1,
            data: kpcts,
            lineStyle: { color: '#4ade80', width: 2.5, type: 'dotted' },
            itemStyle: { color: '#4ade80', borderWidth: 2, borderColor: '#141920' },
            symbol: 'circle',
            symbolSize: 8,
            smooth: true,
            animationDuration: 800,
          },
        ],
      });
    }

    window.addEventListener('resize', () => { if (fatigueChart) fatigueChart.resize(); });

    function renderFatigueTable(data) {
      const tbody = document.getElementById('fatigueTableBody');
      tbody.replaceChildren();

      data.forEach((d, i) => {
        const ba = d.ba_against || 0;
        const isFatigue = !!d.is_fatigue_point;
        const tr = document.createElement('tr');
        tr.className = (i % 2 === 0 ? '' : 'bg-white/[0.02]') +
          ' border-b border-surface-border/50 hover:bg-white/[0.04] transition-colors' +
          (isFatigue ? ' bg-red-900/10' : '');

        function td(text, align, mono, color) {
          const el = document.createElement('td');
          el.className = 'px-5 py-3' + (align === 'r' ? ' text-right' : '') +
            (mono ? ' font-mono' : '');
          if (color) el.style.color = color;
          el.textContent = text;
          return el;
        }

        const statusTd = document.createElement('td');
        statusTd.className = 'px-5 py-3 text-right';
        const badge = document.createElement('span');
        badge.className = 'text-xs font-semibold';
        if (isFatigue) {
          badge.style.color = '#f87171';
          badge.textContent = '疲勞警戒';
        } else {
          badge.style.color = '#4ade80';
          badge.textContent = '正常';
        }
        statusTd.appendChild(badge);

        const bucketLabel = d.pitch_start && d.pitch_end ? `${d.pitch_start}-${d.pitch_end}` : (d.pitch_bucket || d.bucket || '—');
        tr.appendChild(td(bucketLabel, 'l', false, '#ffffff'));
        tr.appendChild(td(d.batters_faced != null ? String(d.batters_faced) : (d.pa != null ? String(d.pa) : '—'), 'r', true, '#d1d5db'));
        tr.appendChild(td(ba > 0 ? ba.toFixed(3) : '—', 'r', true, isFatigue ? '#f87171' : '#ffffff'));
        tr.appendChild(td(d.k_pct != null ? (d.k_pct * 100).toFixed(1) + '%' : '—', 'r', true, '#d1d5db'));
        tr.appendChild(td(d.bb_pct != null ? (d.bb_pct * 100).toFixed(1) + '%' : '—', 'r', true, '#d1d5db'));
        tr.appendChild(statusTd);
        tbody.appendChild(tr);
      });
    }

    document.getElementById('yearSelect').addEventListener('change', () => {
      loadPitchers();
      // 切年份時清除上一個投手的圖表/表格
      document.getElementById('chartContainer').classList.add('hidden');
      document.getElementById('tableContainer').classList.add('hidden');
      document.getElementById('fatigueInfo').classList.add('hidden');
      document.getElementById('emptyState').classList.remove('hidden');
      document.getElementById('analyzeBtn').disabled = true;
    });

    loadPitchers();
  </script>
</body>
</html>
