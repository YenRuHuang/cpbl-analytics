name: Daily Data Update

on:
  schedule:
    # 每天台灣時間 06:00（UTC 22:00 前一天）— 確保前晚比賽結束後才跑
    - cron: "0 22 * * *"
  workflow_dispatch: # 手動觸發

jobs:
  seed-and-export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Seed latest CPBL data (2025 + 2026)
        env:
          PYTHONPATH: .
        run: |
          uv run python scripts/seed_cpbl.py --year 2025
          uv run python scripts/seed_cpbl.py --year 2026

      - name: Export static JSON
        env:
          PYTHONPATH: .
        run: uv run python scripts/export_static.py

      - name: Check for changes
        id: changes
        run: |
          git add dashboard/static/api/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: daily data update"
          git push
